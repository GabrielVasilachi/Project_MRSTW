services:
  db:
    image: postgres:latest
    container_name: mrstw-postgres
    environment:
      POSTGRES_DB: mrstw
      POSTGRES_USER: mrstw_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data:
